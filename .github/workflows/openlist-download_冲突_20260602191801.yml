name: OpenList 下载并推送

on:
  workflow_dispatch:
    inputs:
      openlist_domain:
        description: 'OpenList 域名（不含 https://）'
        required: true
      source_path:
        description: '源目录路径（如 /path/to/files）'
        required: true
      remote_path:
        description: 'rclone 推送目标（如 mupan:\Some\Folder）'
        required: true

permissions:
  contents: read

env:
  OPENLIST_URL: https://${{ github.event.inputs.openlist_domain }}
  DL_DIR: D:\tasks\dl
  TOOLS_DIR: D:\tasks\tools

jobs:
  # ============================================================
  # Job 1: 递归列出 OpenList 目录下所有文件，按大小分组输出矩阵
  # ============================================================
  list-files:
    runs-on: windows-latest
    outputs:
      matrix-small: ${{ steps.build-matrix.outputs.matrix-small }}
      matrix-large: ${{ steps.build-matrix.outputs.matrix-large }}
      small-count: ${{ steps.build-matrix.outputs.small-count }}
      large-count: ${{ steps.build-matrix.outputs.large-count }}
    steps:
      - name: 递归获取所有文件列表
        id: get-files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $baseUrl = "${{ env.OPENLIST_URL }}"
          $sourcePath = "${{ github.event.inputs.source_path }}"
          if (-not $sourcePath.StartsWith('/')) { $sourcePath = "/$sourcePath" }

          # 递归获取目录下所有文件
          $script:allFiles = [System.Collections.ArrayList]::new()
          $pageSize = 99999  # 足够大的值，一次取完所有文件

          function Get-OpenListFiles([string]$path) {
            $body = @{ path = $path; password = ''; page = 1; per_page = $pageSize; refresh = $false } | ConvertTo-Json
            $resp = Invoke-RestMethod -Uri "$baseUrl/api/fs/list" `
              -Method Post -ContentType 'application/json' -Body $body -TimeoutSec 120
            if ($resp.code -ne 200) { throw "列出目录失败 [$path]: $($resp.message)" }
            if (-not $resp.data -or -not $resp.data.content) { return }
            foreach ($item in $resp.data.content) {
              if ($item.is_dir) {
                $subPath = if ($path -eq '/') { "/$($item.name)" } else { "$path/$($item.name)" }
                Get-OpenListFiles -path $subPath
              } else {
                [void]$script:allFiles.Add(@{
                  name     = $item.name
                  path     = if ($path -eq '/') { "/$($item.name)" } else { "$path/$($item.name)" }
                  size     = [long]$item.size
                  modified = $item.modified
                })
              }
            }
          }

          Write-Host "正在列出 $sourcePath 下的所有文件..."
          Get-OpenListFiles -path $sourcePath
          Write-Host "共找到 $($script:allFiles.Count) 个文件"

          # 确保输出目录存在
          New-Item -ItemType Directory -Force -Path 'D:\tasks' | Out-Null

          # 输出 JSON 列表（后续 step 使用），空目录时写 [] 避免下游崩
          if ($script:allFiles.Count -eq 0) {
            '[]' | Out-File -FilePath 'D:\tasks\all_files.json' -Encoding utf8
          } else {
            $script:allFiles | ConvertTo-Json -Depth 5 -Compress | Out-File -FilePath 'D:\tasks\all_files.json' -Encoding utf8
          }

      - name: 构建下载矩阵
        id: build-matrix
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $threshold = 524288000  # 500 * 1024^2
          $files = Get-Content -Path 'D:\tasks\all_files.json' -Raw | ConvertFrom-Json

          # 使用 ConvertTo-Json 安全构建 JSON（正确处理所有特殊字符）
          function FilesToJson($fileList) {
            if ($fileList.Count -eq 0) { return '[]' }
            return ($fileList | Select-Object name, path, size | ConvertTo-Json -Depth 3 -Compress)
          }

          $smallFiles = @()
          $largeFiles = @()

          foreach ($f in $files) {
            if ($f.size -gt $threshold) {
              $largeFiles += $f
            } else {
              $smallFiles += $f
            }
          }

          Write-Host "总计 $($files.Count) 个文件: $($smallFiles.Count) 个小文件(<=500M), $($largeFiles.Count) 个大文件(>500M)"

          # 单次写入整个 GITHUB_OUTPUT 文件
          $out = $env:GITHUB_OUTPUT
          $eof1 = [guid]::NewGuid().ToString()
          $eof2 = [guid]::NewGuid().ToString()
          $nl = "`n"
          $content = "matrix-small<<$eof1$nl" + (FilesToJson $smallFiles) + "$nl$eof1$nl"
          $content += "matrix-large<<$eof2$nl" + (FilesToJson $largeFiles) + "$nl$eof2$nl"
          $content += "total=$($files.Count)$nl"
          $content += "small-count=$($smallFiles.Count)$nl"
          $content += "large-count=$($largeFiles.Count)$nl"
          [System.IO.File]::WriteAllText($out, $content, [System.Text.UTF8Encoding]::new($false))
          Write-Host "GITHUB_OUTPUT 已写入"
          [System.IO.File]::ReadAllText($out) | Write-Host

  # ============================================================
  # Job 2: 下载并推送所有 <=500MB 的文件（单个 runner 处理全部）
  # ============================================================
  dl-small:
    needs: list-files
    if: ${{ needs.list-files.outputs.small-count != '0' }}
    runs-on: windows-latest
    steps:
      - name: 获取 rclone.conf
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.RCLONE_PAT }}"
            Accept = "application/vnd.github.v3.raw"
          }
          $owner = "${{ github.repository_owner }}"
          $repo = "rclone-action"
          $url = "https://api.github.com/repos/$owner/$repo/contents/rclone.conf"
          Write-Host "从 $owner/$repo 获取 rclone.conf..."
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile "rclone.conf"
          Write-Host "rclone.conf 获取成功"

      - name: 安装 aria2c
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.TOOLS_DIR }}" | Out-Null
          Invoke-WebRequest -Uri 'https://github.com/agalwood/Motrix/raw/refs/heads/master/extra/win32/x64/engine/aria2c.exe' `
            -OutFile "${{ env.TOOLS_DIR }}\aria2c.exe"
          "${{ env.TOOLS_DIR }}" >> $env:GITHUB_PATH

      - name: 安装 rclone
        shell: pwsh
        run: |
          $rcloneZip = "${{ env.TOOLS_DIR }}\rclone.zip"
          Invoke-WebRequest -Uri 'https://downloads.rclone.org/rclone-current-windows-amd64.zip' -OutFile $rcloneZip
          Expand-Archive -Path $rcloneZip -DestinationPath "${{ env.TOOLS_DIR }}" -Force
          $rcloneDir = Get-ChildItem -Path "${{ env.TOOLS_DIR }}" -Directory -Filter 'rclone-*-windows-amd64' | Select-Object -First 1
          Copy-Item "$($rcloneDir.FullName)\rclone.exe" "${{ env.TOOLS_DIR }}\rclone.exe" -Force
          "${{ env.TOOLS_DIR }}" >> $env:GITHUB_PATH

      - name: 创建目录结构并下载
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $baseUrl = "${{ env.OPENLIST_URL }}"
          $dlDir = "${{ env.DL_DIR }}"
          $files = '${{ needs.list-files.outputs.matrix-small }}' | ConvertFrom-Json
          $sourcePath = "${{ github.event.inputs.source_path }}"
          if (-not $sourcePath.StartsWith('/')) { $sourcePath = "/$sourcePath" }

          Write-Host "开始处理 $($files.Count) 个小文件..."

          # 按子目录分组，预创建所有目录，同时拼接 aria2c 输入文件
          $urlsContent = [System.Text.StringBuilder]::new()
          $skippedCount = 0
          foreach ($f in $files) {
            # 只保留源目录内的相对路径，避免推送时嵌套
            $relativePath = $f.path.Substring($sourcePath.Length).TrimStart('/')
            $localDir = Join-Path $dlDir (Split-Path $relativePath -Parent)
            if (-not (Test-Path $localDir)) { New-Item -ItemType Directory -Force -Path $localDir | Out-Null }

            # 获取下载链接
            try {
              $body = @{ path = $f.path; password = '' } | ConvertTo-Json
              $resp = Invoke-RestMethod -Uri "$baseUrl/api/fs/get" `
                -Method Post -ContentType 'application/json' -Body $body -TimeoutSec 60
              if ($resp.code -ne 200) {
                Write-Warning "获取下载链接失败 [$($f.path)]: $($resp.message)，跳过此文件"
                $skippedCount++
                continue
              }

              $rawUrl = $resp.data.raw_url
              $outFile = Split-Path $f.path -Leaf

              # 拼接到 aria2c 输入文件内容（后续一次性写入）
              [void]$urlsContent.AppendLine($rawUrl)
              [void]$urlsContent.AppendLine("  dir=$localDir")
              [void]$urlsContent.AppendLine("  out=$outFile")

              Write-Host "  [$($f.path)] $($f.size) bytes -> $rawUrl"
            } catch {
              Write-Warning "获取下载链接异常 [$($f.path)]: $_，跳过此文件"
              $skippedCount++
            }
          }

          Write-Host "共跳过 $skippedCount 个文件，待下载 $($files.Count - $skippedCount) 个文件"

          # 一次性写入 aria2c 输入文件
          [System.IO.File]::WriteAllText("$dlDir\urls.txt", $urlsContent.ToString(), [System.Text.UTF8Encoding]::new($false))

          Write-Host "目录结构创建完成，开始 aria2c 批量下载..."

      - name: aria2c 批量下载
        shell: pwsh
        run: |
          aria2c `
            --input-file="${{ env.DL_DIR }}\urls.txt" `
            --max-connection-per-server=16 `
            --split=16 `
            --min-split-size=5M `
            --continue=true `
            --auto-file-renaming=false `
            --allow-overwrite=true `
            --check-certificate=false `
            -c `
            --file-allocation=none `
            --connect-timeout=30 `
            --timeout=600 `
            --max-tries=3 `
            --retry-wait=10 `
            --console-log-level=notice `
            --summary-interval=10
          $exitCode = $LASTEXITCODE
          Write-Host "aria2c 退出码: $exitCode"
          if ($exitCode -ne 0) {
            Write-Warning "部分文件下载失败（退出码 $exitCode），继续推送已下载的文件..."
            $global:LASTEXITCODE = 0
          }
          Write-Host "下载完成"

      - name: rclone 推送到 remote
        shell: pwsh
        run: |
          $sourcePath = "${{ github.event.inputs.source_path }}"
          $rcloneSource = "${{ env.DL_DIR }}\"
          $rcloneTarget = "${{ github.event.inputs.remote_path }}"

          # 确保 remote_path 以 / 结尾（目录模式）
          if (-not $rcloneTarget.EndsWith(':') -and -not $rcloneTarget.EndsWith('/')) {
            $rcloneTarget += '/'
          }

          Write-Host "推送到 $rcloneTarget ..."
          rclone copy $rcloneSource $rcloneTarget `
            --config rclone.conf `
            --progress `
            --transfers=8 `
            --checkers=16 `
            --low-level-retries=3 `
            --retries=3
          Write-Host "推送完成"

  # ============================================================
  # Job 3: 下载并推送单个 >500MB 的文件（每个文件单独一个 runner）
  # ============================================================
  dl-large:
    needs: list-files
    if: ${{ needs.list-files.outputs.large-count != '0' }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        file: ${{ fromJSON(needs.list-files.outputs.matrix-large) }}
    steps:
      - name: 获取 rclone.conf
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token ${{ secrets.RCLONE_PAT }}"
            Accept = "application/vnd.github.v3.raw"
          }
          $owner = "${{ github.repository_owner }}"
          $repo = "rclone-action"
          $url = "https://api.github.com/repos/$owner/$repo/contents/rclone.conf"
          Write-Host "从 $owner/$repo 获取 rclone.conf..."
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile "rclone.conf"
          Write-Host "rclone.conf 获取成功"

      - name: 安装 aria2c
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.TOOLS_DIR }}" | Out-Null
          Invoke-WebRequest -Uri 'https://github.com/agalwood/Motrix/raw/refs/heads/master/extra/win32/x64/engine/aria2c.exe' `
            -OutFile "${{ env.TOOLS_DIR }}\aria2c.exe"
          "${{ env.TOOLS_DIR }}" >> $env:GITHUB_PATH

      - name: 安装 rclone
        shell: pwsh
        run: |
          $rcloneZip = "${{ env.TOOLS_DIR }}\rclone.zip"
          Invoke-WebRequest -Uri 'https://downloads.rclone.org/rclone-current-windows-amd64.zip' -OutFile $rcloneZip
          Expand-Archive -Path $rcloneZip -DestinationPath "${{ env.TOOLS_DIR }}" -Force
          $rcloneDir = Get-ChildItem -Path "${{ env.TOOLS_DIR }}" -Directory -Filter 'rclone-*-windows-amd64' | Select-Object -First 1
          Copy-Item "$($rcloneDir.FullName)\rclone.exe" "${{ env.TOOLS_DIR }}\rclone.exe" -Force
          "${{ env.TOOLS_DIR }}" >> $env:GITHUB_PATH

      - name: 获取下载链接并下载
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $baseUrl = "${{ env.OPENLIST_URL }}"
          $dlDir = "${{ env.DL_DIR }}"
          $filePath = '${{ matrix.file.path }}'
          $fileName = '${{ matrix.file.name }}'

          # 获取下载链接
          $body = @{ path = $filePath; password = '' } | ConvertTo-Json
          $resp = Invoke-RestMethod -Uri "$baseUrl/api/fs/get" `
            -Method Post -ContentType 'application/json' -Body $body -TimeoutSec 60
          if ($resp.code -ne 200) { throw "获取下载链接失败 [$filePath]: $($resp.message)" }

          $rawUrl = $resp.data.raw_url
          # 只保留源目录内的相对路径
          $sourcePath = "${{ github.event.inputs.source_path }}"
          if (-not $sourcePath.StartsWith('/')) { $sourcePath = "/$sourcePath" }
          $relativePath = $filePath.Substring($sourcePath.Length).TrimStart('/')
          $localDir = Join-Path $dlDir (Split-Path $relativePath -Parent)
          New-Item -ItemType Directory -Force -Path $localDir | Out-Null

          Write-Host "下载大文件: $filePath ($([math]::Round(${{ matrix.file.size }} / 1GB, 2)) GB)"
          Write-Host "URL: $rawUrl"

          # 写入 aria2c 输入文件
          $inputFile = "$dlDir\large_urls.txt"
          $rawUrl | Out-File -FilePath $inputFile -Encoding utf8
          "  dir=$localDir" | Add-Content -Path $inputFile
          "  out=$fileName" | Add-Content -Path $inputFile

          aria2c `
            --input-file=$inputFile `
            --max-connection-per-server=32 `
            --split=32 `
            --min-split-size=20M `
            --continue=true `
            --auto-file-renaming=false `
            --allow-overwrite=true `
            --check-certificate=false `
            -c `
            --file-allocation=none `
            --connect-timeout=30 `
            --timeout=600 `
            --max-tries=3 `
            --retry-wait=10 `
            --console-log-level=notice `
            --summary-interval=30
          $exitCode = $LASTEXITCODE
          Write-Host "aria2c 退出码: $exitCode"
          if ($exitCode -ne 0) {
            Write-Warning "下载失败（退出码 $exitCode），跳过推送..."
            # 标记下载失败，后续推送 step 跳过
            "failed" | Out-File -FilePath "$dlDir\large_dl_failed.txt" -Encoding utf8
            exit 0
          }
          # 标记下载成功，供后续 step 判断
          "success" | Out-File -FilePath "$dlDir\large_dl_status.txt" -Encoding utf8
          Write-Host "大文件下载完成"

      - name: rclone 推送到 remote
        if: ${{ !cancelled() }}
        shell: pwsh
        run: |
          # 检查下载是否成功
          if (Test-Path "${{ env.DL_DIR }}\large_dl_failed.txt") {
            Write-Host "下载失败，跳过推送..."
            exit 0
          }
          $filePath = '${{ matrix.file.path }}'
          $sourcePath = "${{ github.event.inputs.source_path }}"
          if (-not $sourcePath.StartsWith('/')) { $sourcePath = "/$sourcePath" }
          $relativePath = $filePath.Substring($sourcePath.Length).TrimStart('/')
          $localDir = Join-Path "${{ env.DL_DIR }}" (Split-Path $relativePath -Parent)
          $rcloneTarget = "${{ github.event.inputs.remote_path }}"

          # 如果文件在子目录下，追加到 remote 目标路径
          $subDir = Split-Path $relativePath -Parent
          if ($subDir) {
            if ($rcloneTarget.EndsWith(':')) {
              $rcloneTarget = "$rcloneTarget$subDir/"
            } else {
              $rcloneTarget = "$rcloneTarget/$subDir/"
            }
          } else {
            if (-not $rcloneTarget.EndsWith(':') -and -not $rcloneTarget.EndsWith('/')) {
              $rcloneTarget += '/'
            }
          }

          Write-Host "推送 $filePath -> $rcloneTarget"
          rclone copy "$localDir" "$rcloneTarget" `
            --config rclone.conf `
            --progress `
            --transfers=4 `
            --onedrive-chunk-size 250M `
            --low-level-retries=3 `
            --retries=3
          Write-Host "推送完成"
