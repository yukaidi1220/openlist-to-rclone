name: Rclone 分批同步

on:
  workflow_dispatch:
    inputs:
      prefer_ipv6:
        description: '是否优先使用 IPv6'
        required: false
        default: 'false'
        type: boolean
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full        # 完整流程：分批 + 同步所有 batch
          - dispatch    # 只运行分批，查看结果
          - rerun       # 重跑指定 batch
      rclone_src:
        description: '源路径（如 onedrive:path）'
        required: true
      rclone_dst:
        description: '目标路径（如 webdav:path）'
        required: true
      max_batch_gb:
        description: '每批最大大小（GB）'
        required: false
        default: '50'
        type: number
      max_file_gb:
        description: '单文件最大大小（GB），超过此大小的文件将被跳过'
        required: false
        default: '100'
        type: number
      cleanup_dst:
        description: '是否清理目的端多余文件'
        required: false
        default: false
        type: boolean
      batch_id:
        description: 'rerun 模式下要重跑的 batch 编号'
        required: false
        type: number
      run_id:
        description: 'rerun 模式下原始 workflow run_id'
        required: false
  workflow_call:
    inputs:
      prefer_ipv6:
        type: boolean
        default: false
      mode:
        type: string
        default: 'full'
      rclone_src:
        type: string
        required: true
      rclone_dst:
        type: string
        required: true
      max_batch_gb:
        type: number
        default: 50
      max_file_gb:
        type: number
        default: 100
      cleanup_dst:
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

env:
  RCLONE_TRANSFERS: "4"
  RCLONE_CHECKERS: "16"
  RCLONE_TPSLIMIT: "1"
  RCLONE_STATS_INTERVAL: "10s"

jobs:
  # ============================================================
  # Job 1: 分批器（dispatch/full 模式）
  # 对比两端差异 → 获取文件列表 → bin-pack → 输出 matrix
  # ============================================================
  dispatch:
    if: inputs.mode != 'rerun'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      batch_count: ${{ steps.split.outputs.batch_count }}
    env:
      TOOLS_DIR: /tmp/tasks/tools
      OPENLIST_DIR: /tmp/tasks/openlist
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      # ============================================================
      # 安装 Cloudflare WARP（始终执行，提供 IPv6 连接）
      # ============================================================
      - name: 安装 Cloudflare WARP
        run: |
          set -e

          echo ">>> 安装 WireGuard 依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools resolvconf

          echo ">>> 下载 wgcf..."
          for i in {1..5}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              -o wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64; then
              echo "wgcf 下载成功"
              break
            fi
            echo "wgcf 下载失败，重试 $i/5..."
            sleep $((i * 5))
          done
          if [ ! -f wgcf ]; then
            echo "::error::无法下载 wgcf，已重试 5 次"
            exit 1
          fi
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

          echo ">>> 注册 WARP 账户..."
          REGISTERED=false
          for i in {1..5}; do
            if wgcf register --accept-tos; then
              REGISTERED=true
              break
            fi
            echo "注册失败，重试 $i/5..."
            sleep $((i * 10))
          done

          # 检查注册是否成功
          if [ "$REGISTERED" = false ] || [ ! -f wgcf-account.toml ]; then
            echo "::error::WARP 注册失败，已重试 5 次"
            exit 1
          fi
          echo ">>> 注册成功"

          echo ">>> 生成 WireGuard 配置..."
          wgcf generate

          echo ">>> 手动拉起 WARP 接口..."
          PRIVATE_KEY=$(grep 'PrivateKey' wgcf-profile.conf | awk '{print $NF}')
          ADDRESSES=$(grep 'Address' wgcf-profile.conf | awk -F'= ' '{print $2}')
          ADDR_V4=$(echo "$ADDRESSES" | awk -F', ' '{print $1}' | sed 's/,$//')
          ADDR_V6=$(echo "$ADDRESSES" | awk -F', ' '{print $2}')
          PEER_KEY=$(grep  'PublicKey' wgcf-profile.conf | awk '{print $NF}')
          ENDPOINT=$(grep  'Endpoint' wgcf-profile.conf  | awk '{print $NF}')

          INTERFACE=wgcf
          sudo ip link add $INTERFACE type wireguard
          echo "$PRIVATE_KEY" | sudo wg set $INTERFACE private-key /dev/stdin
          sudo wg set $INTERFACE peer "$PEER_KEY" endpoint "$ENDPOINT" allowed-ips "::/0"

          # 先启用接口，再添加地址
          sudo ip link set mtu 1280 up dev $INTERFACE
          sudo ip addr add "$ADDR_V4" dev $INTERFACE

          # IPv6 地址非空时才添加
          if [ -n "$ADDR_V6" ]; then
            sudo ip addr add "$ADDR_V6" dev $INTERFACE
            sudo ip -6 route replace ::/0 dev $INTERFACE
          else
            echo "::warning::WARP 未分配 IPv6 地址，跳过 IPv6 配置"
          fi

          echo ">>> 验证 IPv6..."
          curl -6 -sS --max-time 10 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "::warning::IPv6 不通"

          echo ">>> WARP 状态:"
          curl -sS --max-time 5 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E 'warp|ip|colo' || true

      # ============================================================
      # 配置 IP 版本优先级（gai.conf）
      # ============================================================
      - name: 配置 IP 版本优先级
        env:
          PREFER_IPV6: ${{ inputs.prefer_ipv6 }}
        run: |
          echo ">>> 配置 IP 版本优先级 (prefer_ipv6=$PREFER_IPV6)..."

          # 清理旧的 precedence 规则
          sudo sed -i '/^precedence/d' /etc/gai.conf 2>/dev/null || true

          if [ "$PREFER_IPV6" = "true" ]; then
            echo "precedence ::/0  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv6 优先"
          else
            echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv4 优先"

            # 提高 IPv6 路由 metric（内核层路由控制）
            sudo ip -6 route replace ::/0 dev wgcf metric 1000 2>/dev/null || {
              echo "::warning::WARP IPv6 路由不存在，跳过路由调整"
            }
          fi

          echo ">>> gai.conf 配置:"
          cat /etc/gai.conf

          echo ">>> 验证路由:"
          ip route show | head -5
          echo "---"
          ip -6 route show | head -5

          echo ">>> 测试连通性:"
          curl -4 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv4 OK" || echo "IPv4 失败"
          curl -6 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "IPv6 失败"
          echo ">>> 当前优先使用的出口 IP:"
          curl -sS --max-time 5 https://v.itdog.cn 2>/dev/null || echo "获取失败"

      # ============================================================
      # 网络信息检查
      # ============================================================
      - name: 网络信息检查
        run: |
          echo "=== 网络信息 ==="

          # Azure IMDS 获取区域
          METADATA=$(curl -sS -H "Metadata:true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            --max-time 2 2>/dev/null) || true
          if [ -n "$METADATA" ]; then
            AZURE_LOCATION=$(echo "$METADATA" | jq -r '.compute.location // "未知"')
            VM_SIZE=$(echo "$METADATA" | jq -r '.compute.vmSize // "未知"')
            echo "Azure 区域: $AZURE_LOCATION"
            echo "VM 大小: $VM_SIZE"
          else
            echo "Azure 区域: 不可用"
          fi

          # 获取 IPv4
          IPV4=$(curl -sS "https://4.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv4: ${IPV4:-获取失败}"

          # 获取 IPv6
          IPV6=$(curl -sS "https://6.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv6: ${IPV6:-获取失败或不支持}"

          # 获取 IP 归属地
          GEO=$(curl -sS "https://myip.ipip.net/json" --max-time 5 2>/dev/null) || true
          if [ -n "$GEO" ]; then
            RET=$(echo "$GEO" | jq -r '.ret // "fail"')
            if [ "$RET" = "ok" ]; then
              LOCATION=$(echo "$GEO" | jq -r '.data.location // [] | join(" ")')
              echo "归属地: $LOCATION"
            else
              echo "归属地: 获取失败"
            fi
          else
            echo "归属地: 获取失败"
          fi

      # ============================================================
      # 部署 OpenList（rclone list: remote 依赖本地 OpenList）
      # ============================================================
      - name: 部署 OpenList
        run: |
          set -e
          mkdir -p "${{ env.OPENLIST_DIR }}"
          mkdir -p "${{ env.TOOLS_DIR }}"

          # 下载 OpenList 二进制
          OPENLIST_URL='https://github.com/OpenListTeam/OpenList/releases/latest/download/openlist-linux-amd64.tar.gz'
          echo ">>> 下载 OpenList: $OPENLIST_URL"
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              "$OPENLIST_URL" -o "${{ env.TOOLS_DIR }}/openlist.tar.gz"; then
              echo "OpenList 下载成功"
              break
            fi
            echo "OpenList 下载失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if [ ! -f "${{ env.TOOLS_DIR }}/openlist.tar.gz" ]; then
            echo "::error::无法下载 OpenList"
            exit 1
          fi

          echo ">>> 解压 OpenList..."
          tar -xzf "${{ env.TOOLS_DIR }}/openlist.tar.gz" -C "${{ env.OPENLIST_DIR }}"
          chmod +x "${{ env.OPENLIST_DIR }}/openlist"

          # 部署 data.db
          mkdir -p "${{ env.OPENLIST_DIR }}/data"
          if [ -f "$GITHUB_WORKSPACE/openlist/data/data.db" ]; then
            cp -f "$GITHUB_WORKSPACE/openlist/data/data.db" "${{ env.OPENLIST_DIR }}/data/data.db"
            echo "data.db 已从本仓库部署"
          else
            echo ">>> 本仓库无 data.db，尝试从 rclone-action 获取..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: token ${{ secrets.RCLONE_PAT }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ github.repository_owner }}/rclone-action/contents/openlist/data/data.db" \
              -o "${{ env.OPENLIST_DIR }}/data/data.db" || {
              echo "::error::无法获取 data.db"
              exit 1
            }
            echo "data.db 已从 rclone-action 仓库部署"
          fi

      - name: 启动 OpenList
        run: |
          set -e

          OPENLIST_BIN="${{ env.OPENLIST_DIR }}/openlist"
          OPENLIST_DATA="${{ env.OPENLIST_DIR }}/data"
          OPENLIST_LOG="/tmp/tasks/openlist.log"

          echo ">>> 启动 OpenList..."
          nohup "$OPENLIST_BIN" server --data "$OPENLIST_DATA" > "$OPENLIST_LOG" 2>&1 &
          OPENLIST_PID=$!
          echo "OpenList PID: $OPENLIST_PID"
          echo "$OPENLIST_PID" > /tmp/tasks/openlist.pid

          echo ">>> 等待 OpenList 就绪..."
          READY=false
          for i in {1..15}; do
            if curl -sS --max-time 3 http://127.0.0.1:5244/api/public/settings > /dev/null 2>&1; then
              READY=true
              echo "OpenList 已就绪 (等待了 $((i * 2)) 秒)"
              break
            fi
            sleep 2
          done

          if [ "$READY" != "true" ]; then
            echo "::warning::OpenList 30 秒内未就绪，查看日志:"
            tail -30 "$OPENLIST_LOG" || true
            echo "::error::OpenList 启动失败"
            exit 1
          fi

      - name: 安装 rclone
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 10 \
              https://rclone.org/install.sh -o /tmp/install_rclone.sh; then
              sudo bash /tmp/install_rclone.sh && break
            fi
            echo "rclone 安装失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if ! command -v rclone &>/dev/null; then
            echo "::error::rclone 安装失败"
            exit 1
          fi
          rclone version

      - name: 获取 rclone.conf
        env:
          RCLONE_PAT: ${{ secrets.RCLONE_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 15 --max-time 30 --retry 2 --retry-delay 5 \
              -H "Authorization: token $RCLONE_PAT" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$REPO_OWNER/rclone-action/contents/rclone.conf" \
              -o "$GITHUB_WORKSPACE/rclone.conf"; then
              echo "rclone.conf 获取成功"
              break
            fi
            echo "获取失败，重试 $i/3..."
            sleep $((i * 5))
          done
          if [ ! -f "$GITHUB_WORKSPACE/rclone.conf" ]; then
            echo "::error::无法获取 rclone.conf，请检查 RCLONE_PAT 权限或 rclone-action 仓库是否存在"
            exit 1
          fi

      - name: 对比源和目标差异
        id: diff
        env:
          RCLONE_SRC: ${{ inputs.rclone_src }}
          RCLONE_DST: ${{ inputs.rclone_dst }}
          MAX_FILE_GB: ${{ inputs.max_file_gb }}
        run: |
          echo ">>> 对比源和目标差异..."
          echo "源: $RCLONE_SRC"
          echo "目标: $RCLONE_DST"
          echo "单文件最大: ${MAX_FILE_GB} GB"

          # 使用 rclone check --one-way 对比差异
          rclone check --one-way --size-only \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --missing-on-dst /tmp/missing.txt \
            --differ /tmp/differ.txt \
            --min-size 1B \
            --max-size "${MAX_FILE_GB}G" \
            --stats 10s \
            --tpslimit 1 \
            --progress \
            "$RCLONE_SRC" "$RCLONE_DST" 2>/dev/null || true

          # 合并需要传输的文件列表
          cat /tmp/missing.txt /tmp/differ.txt > /tmp/transfer.txt 2>/dev/null || true
          transfer_count=$(wc -l < /tmp/transfer.txt 2>/dev/null || echo "0")
          echo "需要同步的文件数: $transfer_count"

          if [[ "$transfer_count" -eq 0 ]]; then
            echo "无需同步！"
            echo "batch_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "transfer_count=$transfer_count" >> "$GITHUB_OUTPUT"

      - name: 获取文件大小信息
        id: sizes
        if: steps.diff.outputs.transfer_count != '0'
        env:
          RCLONE_SRC: ${{ inputs.rclone_src }}
          MAX_FILE_GB: ${{ inputs.max_file_gb }}
        run: |
          echo ">>> 获取文件大小信息..."
          # 格式为 大小;路径（sp = size;path）
          rclone lsf -R --format "sp" --separator ";" \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --files-only --absolute \
            --files-from-raw /tmp/transfer.txt \
            --stats 10s \
            --tpslimit 1 \
            --progress \
            "$RCLONE_SRC" > files_with_size.txt

          echo "文件列表: $(wc -l < files_with_size.txt) 个文件"

      - name: 分批处理
        id: split
        if: steps.diff.outputs.transfer_count != '0'
        env:
          MAX_BATCH_GB: ${{ inputs.max_batch_gb }}
        run: |
          echo ">>> 分批处理（每批最大 $MAX_BATCH_GB GB）..."
          bash bin/split_batches.sh files_with_size.txt "$MAX_BATCH_GB" > matrix.json

          # 使用 delimiter 方式避免内容截断
          DELIMITER="MATRIX_$(date +%s)_$RANDOM"
          echo "matrix<<$DELIMITER" >> "$GITHUB_OUTPUT"
          cat matrix.json >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

          echo "batch_count=$(jq length matrix.json)" >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== 分批结果 ==="
          jq -r '.[] | "Batch \(.id): \(.count) 个文件, \(.bytes / 1024 / 1024 / 1024 | . * 100 | floor / 100) GiB"' matrix.json

      - name: 上传 batch 文件
        if: steps.split.outputs.batch_count != '' && steps.split.outputs.batch_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-batches
          path: batch_*.txt
          retention-days: 3
          if-no-files-found: ignore

      # ============================================================
      # 清理（停止 OpenList 进程）
      # ============================================================
      - name: 停止 OpenList
        if: always()
        run: |
          if [ -f /tmp/tasks/openlist.pid ]; then
            PID=$(cat /tmp/tasks/openlist.pid)
            echo ">>> 停止 OpenList (PID: $PID)..."
            kill "$PID" 2>/dev/null || true
            sleep 3
            kill -9 "$PID" 2>/dev/null || true
            echo "OpenList 已停止"
          fi

  # ============================================================
  # Job 2: 矩阵同步（full 模式）
  # 每个 runner 处理一个 batch
  # ============================================================
  sync:
    needs: dispatch
    if: inputs.mode == 'full' && needs.dispatch.outputs.batch_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TOOLS_DIR: /tmp/tasks/tools
      OPENLIST_DIR: /tmp/tasks/openlist
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJSON(needs.dispatch.outputs.matrix) }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      # ============================================================
      # 安装 Cloudflare WARP（始终执行，提供 IPv6 连接）
      # ============================================================
      - name: 安装 Cloudflare WARP
        run: |
          set -e

          echo ">>> 安装 WireGuard 依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools resolvconf

          echo ">>> 下载 wgcf..."
          for i in {1..5}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              -o wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64; then
              echo "wgcf 下载成功"
              break
            fi
            echo "wgcf 下载失败，重试 $i/5..."
            sleep $((i * 5))
          done
          if [ ! -f wgcf ]; then
            echo "::error::无法下载 wgcf，已重试 5 次"
            exit 1
          fi
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

          echo ">>> 注册 WARP 账户..."
          REGISTERED=false
          for i in {1..5}; do
            if wgcf register --accept-tos; then
              REGISTERED=true
              break
            fi
            echo "注册失败，重试 $i/5..."
            sleep $((i * 10))
          done

          # 检查注册是否成功
          if [ "$REGISTERED" = false ] || [ ! -f wgcf-account.toml ]; then
            echo "::error::WARP 注册失败，已重试 5 次"
            exit 1
          fi
          echo ">>> 注册成功"

          echo ">>> 生成 WireGuard 配置..."
          wgcf generate

          echo ">>> 手动拉起 WARP 接口..."
          PRIVATE_KEY=$(grep 'PrivateKey' wgcf-profile.conf | awk '{print $NF}')
          ADDRESSES=$(grep 'Address' wgcf-profile.conf | awk -F'= ' '{print $2}')
          ADDR_V4=$(echo "$ADDRESSES" | awk -F', ' '{print $1}' | sed 's/,$//')
          ADDR_V6=$(echo "$ADDRESSES" | awk -F', ' '{print $2}')
          PEER_KEY=$(grep  'PublicKey' wgcf-profile.conf | awk '{print $NF}')
          ENDPOINT=$(grep  'Endpoint' wgcf-profile.conf  | awk '{print $NF}')

          INTERFACE=wgcf
          sudo ip link add $INTERFACE type wireguard
          echo "$PRIVATE_KEY" | sudo wg set $INTERFACE private-key /dev/stdin
          sudo wg set $INTERFACE peer "$PEER_KEY" endpoint "$ENDPOINT" allowed-ips "::/0"

          # 先启用接口，再添加地址
          sudo ip link set mtu 1280 up dev $INTERFACE
          sudo ip addr add "$ADDR_V4" dev $INTERFACE

          # IPv6 地址非空时才添加
          if [ -n "$ADDR_V6" ]; then
            sudo ip addr add "$ADDR_V6" dev $INTERFACE
            sudo ip -6 route replace ::/0 dev $INTERFACE
          else
            echo "::warning::WARP 未分配 IPv6 地址，跳过 IPv6 配置"
          fi

          echo ">>> 验证 IPv6..."
          curl -6 -sS --max-time 10 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "::warning::IPv6 不通"

          echo ">>> WARP 状态:"
          curl -sS --max-time 5 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E 'warp|ip|colo' || true

      # ============================================================
      # 配置 IP 版本优先级（gai.conf）
      # ============================================================
      - name: 配置 IP 版本优先级
        env:
          PREFER_IPV6: ${{ inputs.prefer_ipv6 }}
        run: |
          echo ">>> 配置 IP 版本优先级 (prefer_ipv6=$PREFER_IPV6)..."

          # 清理旧的 precedence 规则
          sudo sed -i '/^precedence/d' /etc/gai.conf 2>/dev/null || true

          if [ "$PREFER_IPV6" = "true" ]; then
            echo "precedence ::/0  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv6 优先"
          else
            echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv4 优先"

            # 提高 IPv6 路由 metric（内核层路由控制）
            sudo ip -6 route replace ::/0 dev wgcf metric 1000 2>/dev/null || {
              echo "::warning::WARP IPv6 路由不存在，跳过路由调整"
            }
          fi

          echo ">>> gai.conf 配置:"
          cat /etc/gai.conf

          echo ">>> 验证路由:"
          ip route show | head -5
          echo "---"
          ip -6 route show | head -5

          echo ">>> 测试连通性:"
          curl -4 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv4 OK" || echo "IPv4 失败"
          curl -6 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "IPv6 失败"
          echo ">>> 当前优先使用的出口 IP:"
          curl -sS --max-time 5 https://v.itdog.cn 2>/dev/null || echo "获取失败"

      # ============================================================
      # 网络信息检查
      # ============================================================
      - name: 网络信息检查
        run: |
          echo "=== 网络信息 ==="

          # Azure IMDS 获取区域
          METADATA=$(curl -sS -H "Metadata:true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            --max-time 2 2>/dev/null) || true
          if [ -n "$METADATA" ]; then
            AZURE_LOCATION=$(echo "$METADATA" | jq -r '.compute.location // "未知"')
            VM_SIZE=$(echo "$METADATA" | jq -r '.compute.vmSize // "未知"')
            echo "Azure 区域: $AZURE_LOCATION"
            echo "VM 大小: $VM_SIZE"
          else
            echo "Azure 区域: 不可用"
          fi

          # 获取 IPv4
          IPV4=$(curl -sS "https://4.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv4: ${IPV4:-获取失败}"

          # 获取 IPv6
          IPV6=$(curl -sS "https://6.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv6: ${IPV6:-获取失败或不支持}"

          # 获取 IP 归属地
          GEO=$(curl -sS "https://myip.ipip.net/json" --max-time 5 2>/dev/null) || true
          if [ -n "$GEO" ]; then
            RET=$(echo "$GEO" | jq -r '.ret // "fail"')
            if [ "$RET" = "ok" ]; then
              LOCATION=$(echo "$GEO" | jq -r '.data.location // [] | join(" ")')
              echo "归属地: $LOCATION"
            else
              echo "归属地: 获取失败"
            fi
          else
            echo "归属地: 获取失败"
          fi

      # ============================================================
      # 部署 OpenList（rclone list: remote 依赖本地 OpenList）
      # ============================================================
      - name: 部署 OpenList
        run: |
          set -e
          mkdir -p "${{ env.OPENLIST_DIR }}"
          mkdir -p "${{ env.TOOLS_DIR }}"

          # 下载 OpenList 二进制
          OPENLIST_URL='https://github.com/OpenListTeam/OpenList/releases/latest/download/openlist-linux-amd64.tar.gz'
          echo ">>> 下载 OpenList: $OPENLIST_URL"
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              "$OPENLIST_URL" -o "${{ env.TOOLS_DIR }}/openlist.tar.gz"; then
              echo "OpenList 下载成功"
              break
            fi
            echo "OpenList 下载失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if [ ! -f "${{ env.TOOLS_DIR }}/openlist.tar.gz" ]; then
            echo "::error::无法下载 OpenList"
            exit 1
          fi

          echo ">>> 解压 OpenList..."
          tar -xzf "${{ env.TOOLS_DIR }}/openlist.tar.gz" -C "${{ env.OPENLIST_DIR }}"
          chmod +x "${{ env.OPENLIST_DIR }}/openlist"

          # 部署 data.db
          mkdir -p "${{ env.OPENLIST_DIR }}/data"
          if [ -f "$GITHUB_WORKSPACE/openlist/data/data.db" ]; then
            cp -f "$GITHUB_WORKSPACE/openlist/data/data.db" "${{ env.OPENLIST_DIR }}/data/data.db"
            echo "data.db 已从本仓库部署"
          else
            echo ">>> 本仓库无 data.db，尝试从 rclone-action 获取..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: token ${{ secrets.RCLONE_PAT }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ github.repository_owner }}/rclone-action/contents/openlist/data/data.db" \
              -o "${{ env.OPENLIST_DIR }}/data/data.db" || {
              echo "::error::无法获取 data.db"
              exit 1
            }
            echo "data.db 已从 rclone-action 仓库部署"
          fi

      - name: 启动 OpenList
        run: |
          set -e

          OPENLIST_BIN="${{ env.OPENLIST_DIR }}/openlist"
          OPENLIST_DATA="${{ env.OPENLIST_DIR }}/data"
          OPENLIST_LOG="/tmp/tasks/openlist.log"

          echo ">>> 启动 OpenList..."
          nohup "$OPENLIST_BIN" server --data "$OPENLIST_DATA" > "$OPENLIST_LOG" 2>&1 &
          OPENLIST_PID=$!
          echo "OpenList PID: $OPENLIST_PID"
          echo "$OPENLIST_PID" > /tmp/tasks/openlist.pid

          echo ">>> 等待 OpenList 就绪..."
          READY=false
          for i in {1..15}; do
            if curl -sS --max-time 3 http://127.0.0.1:5244/api/public/settings > /dev/null 2>&1; then
              READY=true
              echo "OpenList 已就绪 (等待了 $((i * 2)) 秒)"
              break
            fi
            sleep 2
          done

          if [ "$READY" != "true" ]; then
            echo "::warning::OpenList 30 秒内未就绪，查看日志:"
            tail -30 "$OPENLIST_LOG" || true
            echo "::error::OpenList 启动失败"
            exit 1
          fi

      - name: 安装 rclone
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 10 \
              https://rclone.org/install.sh -o /tmp/install_rclone.sh; then
              sudo bash /tmp/install_rclone.sh && break
            fi
            echo "rclone 安装失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if ! command -v rclone &>/dev/null; then
            echo "::error::rclone 安装失败"
            exit 1
          fi
          rclone version

      - name: 获取 rclone.conf
        env:
          RCLONE_PAT: ${{ secrets.RCLONE_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 15 --max-time 30 --retry 2 --retry-delay 5 \
              -H "Authorization: token $RCLONE_PAT" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$REPO_OWNER/rclone-action/contents/rclone.conf" \
              -o "$GITHUB_WORKSPACE/rclone.conf"; then
              echo "rclone.conf 获取成功"
              break
            fi
            echo "获取失败，重试 $i/3..."
            sleep $((i * 5))
          done
          if [ ! -f "$GITHUB_WORKSPACE/rclone.conf" ]; then
            echo "::error::无法获取 rclone.conf"
            exit 1
          fi

      - name: 下载 batch 文件
        uses: actions/download-artifact@v4
        with:
          name: rclone-batches

      - name: 同步 batch ${{ matrix.batch.id }}
        env:
          RCLONE_SRC: ${{ inputs.rclone_src }}
          RCLONE_DST: ${{ inputs.rclone_dst }}
        run: |
          set -eo pipefail

          echo "=== Batch ${{ matrix.batch.id }} ==="
          echo "文件数: ${{ matrix.batch.count }}"
          echo "大小: $(awk "BEGIN{printf \"%.2f\", ${{ matrix.batch.bytes }} / 1024 / 1024 / 1024}") GiB"
          echo ""

          BATCH_FILE="batch_${{ matrix.batch.id }}.txt"
          DIFFER_FILE="/tmp/differ_${{ matrix.batch.id }}.txt"

          # 检查需要更新的文件（增强鲁棒性）
          echo ">>> 检查需要更新的文件..."
          rclone check \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --one-way \
            --size-only \
            --differ "$DIFFER_FILE" \
            --files-from-raw "$BATCH_FILE" \
            "$RCLONE_SRC" "$RCLONE_DST" || true

          # 删除需要更新的文件（避免 WebDAV PUT 405 错误）
          if [[ -s "$DIFFER_FILE" ]]; then
            echo ">>> 删除 $(wc -l < "$DIFFER_FILE") 个需要更新的文件..."
            while IFS= read -r file; do
              rclone deletefile \
                --config "$GITHUB_WORKSPACE/rclone.conf" \
                "$RCLONE_DST/$file" 2>/dev/null || true
            done < "$DIFFER_FILE"
            echo "删除完成"
          else
            echo ">>> 无需删除，所有文件已是最新"
          fi

          echo ">>> 开始同步..."
          rclone copy \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --files-from-raw "$BATCH_FILE" \
            --transfers "$RCLONE_TRANSFERS" \
            --checkers "$RCLONE_CHECKERS" \
            --tpslimit "$RCLONE_TPSLIMIT" \
            --stats "$RCLONE_STATS_INTERVAL" \
            --stats-one-line \
            --progress \
            --low-level-retries=10 \
            --retries=10 \
            --retries-sleep=30s \
            --max-duration 180m \
            --cutoff-mode soft \
            --timeout=5m \
            "$RCLONE_SRC" "$RCLONE_DST"
          echo ">>> 同步结束"

          # 解析 rclone 输出并生成汇总
          TRANSFERRED=$(grep -oP 'Transferred:\s+\K[^,]+' /tmp/rclone_output.log | tail -1)
          ERRORS=$(grep -oP 'Errors:\s+\K[0-9]+' /tmp/rclone_output.log | tail -1)
          CHECKS=$(grep -oP 'Checks:\s+\K[^,]+' /tmp/rclone_output.log | tail -1)
          ELAPSED=$(grep -oP 'Elapsed time:\s+\K[^[:space:]]+' /tmp/rclone_output.log | tail -1)
          
          echo ""
          echo "=========================================="
          echo "  Batch ${{ matrix.batch.id }} 同步结果汇总"
          echo "=========================================="
          echo "  计划文件数: ${{ matrix.batch.count }}"
          echo "  计划大小: $(awk "BEGIN{printf \"%.2f\", ${{ matrix.batch.bytes }} / 1024 / 1024 / 1024}") GiB"
          echo "  传输: ${TRANSFERRED:-未知}"
          echo "  检查: ${CHECKS:-未知}"
          echo "  错误: ${ERRORS:-0}"
          echo "  耗时: ${ELAPSED:-未知}"
          echo "=========================================="

      - name: 上传结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-result-batch-${{ matrix.batch.id }}
          path: |
            *.log
          retention-days: 7
          if-no-files-found: ignore

      # ============================================================
      # 清理（停止 OpenList 进程）
      # ============================================================
      - name: 停止 OpenList
        if: always()
        run: |
          if [ -f /tmp/tasks/openlist.pid ]; then
            PID=$(cat /tmp/tasks/openlist.pid)
            echo ">>> 停止 OpenList (PID: $PID)..."
            kill "$PID" 2>/dev/null || true
            sleep 3
            kill -9 "$PID" 2>/dev/null || true
            echo "OpenList 已停止"
          fi

  # ============================================================
  # Job 3: 清理目的端多余文件（full 模式，可选）
  # ============================================================
  cleanup:
    needs: [dispatch, sync]
    if: ${{ !failure() && !cancelled() && inputs.mode == 'full' && inputs.cleanup_dst == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TOOLS_DIR: /tmp/tasks/tools
      OPENLIST_DIR: /tmp/tasks/openlist
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      # ============================================================
      # 安装 Cloudflare WARP
      # ============================================================
      - name: 安装 Cloudflare WARP
        run: |
          set -e

          echo ">>> 安装 WireGuard 依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools resolvconf

          echo ">>> 下载 wgcf..."
          for i in {1..5}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              -o wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64; then
              echo "wgcf 下载成功"
              break
            fi
            echo "wgcf 下载失败，重试 $i/5..."
            sleep $((i * 5))
          done
          if [ ! -f wgcf ]; then
            echo "::error::无法下载 wgcf，已重试 5 次"
            exit 1
          fi
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

          echo ">>> 注册 WARP 账户..."
          REGISTERED=false
          for i in {1..5}; do
            if wgcf register --accept-tos; then
              REGISTERED=true
              break
            fi
            echo "注册失败，重试 $i/5..."
            sleep $((i * 10))
          done

          if [ "$REGISTERED" = false ] || [ ! -f wgcf-account.toml ]; then
            echo "::error::WARP 注册失败，已重试 5 次"
            exit 1
          fi
          echo ">>> 注册成功"

          echo ">>> 生成 WireGuard 配置..."
          wgcf generate

          echo ">>> 手动拉起 WARP 接口..."
          PRIVATE_KEY=$(grep 'PrivateKey' wgcf-profile.conf | awk '{print $NF}')
          ADDRESSES=$(grep 'Address' wgcf-profile.conf | awk -F'= ' '{print $2}')
          ADDR_V4=$(echo "$ADDRESSES" | awk -F', ' '{print $1}' | sed 's/,$//')
          ADDR_V6=$(echo "$ADDRESSES" | awk -F', ' '{print $2}')
          PEER_KEY=$(grep  'PublicKey' wgcf-profile.conf | awk '{print $NF}')
          ENDPOINT=$(grep  'Endpoint' wgcf-profile.conf  | awk '{print $NF}')

          INTERFACE=wgcf
          sudo ip link add $INTERFACE type wireguard
          echo "$PRIVATE_KEY" | sudo wg set $INTERFACE private-key /dev/stdin
          sudo wg set $INTERFACE peer "$PEER_KEY" endpoint "$ENDPOINT" allowed-ips "::/0"

          sudo ip link set mtu 1280 up dev $INTERFACE
          sudo ip addr add "$ADDR_V4" dev $INTERFACE

          if [ -n "$ADDR_V6" ]; then
            sudo ip addr add "$ADDR_V6" dev $INTERFACE
            sudo ip -6 route replace ::/0 dev $INTERFACE
          else
            echo "::warning::WARP 未分配 IPv6 地址，跳过 IPv6 配置"
          fi

          echo ">>> 验证 IPv6..."
          curl -6 -sS --max-time 10 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "::warning::IPv6 不通"

          echo ">>> WARP 状态:"
          curl -sS --max-time 5 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E 'warp|ip|colo' || true

      # ============================================================
      # 配置 IP 版本优先级
      # ============================================================
      - name: 配置 IP 版本优先级
        env:
          PREFER_IPV6: ${{ inputs.prefer_ipv6 }}
        run: |
          echo ">>> 配置 IP 版本优先级 (prefer_ipv6=$PREFER_IPV6)..."

          sudo sed -i '/^precedence/d' /etc/gai.conf 2>/dev/null || true

          if [ "$PREFER_IPV6" = "true" ]; then
            echo "precedence ::/0  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv6 优先"
          else
            echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv4 优先"

            sudo ip -6 route replace ::/0 dev wgcf metric 1000 2>/dev/null || {
              echo "::warning::WARP IPv6 路由不存在，跳过路由调整"
            }
          fi

          echo ">>> gai.conf 配置:"
          cat /etc/gai.conf

      # ============================================================
      # 部署 OpenList
      # ============================================================
      - name: 部署 OpenList
        run: |
          set -e
          mkdir -p "${{ env.OPENLIST_DIR }}"
          mkdir -p "${{ env.TOOLS_DIR }}"

          OPENLIST_URL='https://github.com/OpenListTeam/OpenList/releases/latest/download/openlist-linux-amd64.tar.gz'
          echo ">>> 下载 OpenList: $OPENLIST_URL"
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              "$OPENLIST_URL" -o "${{ env.TOOLS_DIR }}/openlist.tar.gz"; then
              echo "OpenList 下载成功"
              break
            fi
            echo "OpenList 下载失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if [ ! -f "${{ env.TOOLS_DIR }}/openlist.tar.gz" ]; then
            echo "::error::无法下载 OpenList"
            exit 1
          fi

          echo ">>> 解压 OpenList..."
          tar -xzf "${{ env.TOOLS_DIR }}/openlist.tar.gz" -C "${{ env.OPENLIST_DIR }}"
          chmod +x "${{ env.OPENLIST_DIR }}/openlist"

          mkdir -p "${{ env.OPENLIST_DIR }}/data"
          if [ -f "$GITHUB_WORKSPACE/openlist/data/data.db" ]; then
            cp -f "$GITHUB_WORKSPACE/openlist/data/data.db" "${{ env.OPENLIST_DIR }}/data/data.db"
            echo "data.db 已从本仓库部署"
          else
            echo ">>> 本仓库无 data.db，尝试从 rclone-action 获取..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: token ${{ secrets.RCLONE_PAT }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ github.repository_owner }}/rclone-action/contents/openlist/data/data.db" \
              -o "${{ env.OPENLIST_DIR }}/data/data.db" || {
              echo "::error::无法获取 data.db"
              exit 1
            }
            echo "data.db 已从 rclone-action 仓库部署"
          fi

      - name: 启动 OpenList
        run: |
          set -e

          OPENLIST_BIN="${{ env.OPENLIST_DIR }}/openlist"
          OPENLIST_DATA="${{ env.OPENLIST_DIR }}/data"
          OPENLIST_LOG="/tmp/tasks/openlist.log"

          echo ">>> 启动 OpenList..."
          nohup "$OPENLIST_BIN" server --data "$OPENLIST_DATA" > "$OPENLIST_LOG" 2>&1 &
          OPENLIST_PID=$!
          echo "OpenList PID: $OPENLIST_PID"
          echo "$OPENLIST_PID" > /tmp/tasks/openlist.pid

          echo ">>> 等待 OpenList 就绪..."
          READY=false
          for i in {1..15}; do
            if curl -sS --max-time 3 http://127.0.0.1:5244/api/public/settings > /dev/null 2>&1; then
              READY=true
              echo "OpenList 已就绪 (等待了 $((i * 2)) 秒)"
              break
            fi
            sleep 2
          done

          if [ "$READY" != "true" ]; then
            echo "::warning::OpenList 30 秒内未就绪，查看日志:"
            tail -30 "$OPENLIST_LOG" || true
            echo "::error::OpenList 启动失败"
            exit 1
          fi

      - name: 安装 rclone
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 10 \
              https://rclone.org/install.sh -o /tmp/install_rclone.sh; then
              sudo bash /tmp/install_rclone.sh && break
            fi
            echo "rclone 安装失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if ! command -v rclone &>/dev/null; then
            echo "::error::rclone 安装失败"
            exit 1
          fi
          rclone version

      - name: 获取 rclone.conf
        env:
          RCLONE_PAT: ${{ secrets.RCLONE_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 15 --max-time 30 --retry 2 --retry-delay 5 \
              -H "Authorization: token $RCLONE_PAT" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$REPO_OWNER/rclone-action/contents/rclone.conf" \
              -o "$GITHUB_WORKSPACE/rclone.conf"; then
              echo "rclone.conf 获取成功"
              break
            fi
            echo "获取失败，重试 $i/3..."
            sleep $((i * 5))
          done
          if [ ! -f "$GITHUB_WORKSPACE/rclone.conf" ]; then
            echo "::error::无法获取 rclone.conf"
            exit 1
          fi

      - name: 清理目的端多余文件
        env:
          RCLONE_SRC: ${{ inputs.rclone_src }}
          RCLONE_DST: ${{ inputs.rclone_dst }}
          MAX_FILE_GB: ${{ inputs.max_file_gb }}
        run: |
          set -eo pipefail

          echo ">>> 使用 rclone sync 清理目的端多余文件..."
          echo "源: $RCLONE_SRC"
          echo "目标: $RCLONE_DST"
          echo "单文件最大: ${MAX_FILE_GB} GB"

          # rclone sync 会删除目的端多余文件，保持两端一致
          rclone sync "$RCLONE_SRC" "$RCLONE_DST" \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --transfers "$RCLONE_TRANSFERS" \
            --checkers "$RCLONE_CHECKERS" \
            --tpslimit "$RCLONE_TPSLIMIT" \
            --stats "$RCLONE_STATS_INTERVAL" \
            --stats-one-line \
            --progress \
            --low-level-retries=10 \
            --retries=10 \
            --retries-sleep=30s \
            --max-duration 60m \
            --timeout=5m \
            --max-size "${MAX_FILE_GB}G"

          echo ""
          echo "=========================================="
          echo "  目的端清理完成"
          echo "=========================================="
          echo "  源: $RCLONE_SRC"
          echo "  目标: $RCLONE_DST"
          echo "  rclone sync 已删除目的端多余文件"
          echo "=========================================="

      # ============================================================
      # 清理（停止 OpenList 进程）
      # ============================================================
      - name: 停止 OpenList
        if: always()
        run: |
          if [ -f /tmp/tasks/openlist.pid ]; then
            PID=$(cat /tmp/tasks/openlist.pid)
            echo ">>> 停止 OpenList (PID: $PID)..."
            kill "$PID" 2>/dev/null || true
            sleep 3
            kill -9 "$PID" 2>/dev/null || true
            echo "OpenList 已停止"
          fi

  # ============================================================
  # Job 4: 单 batch 重跑（rerun 模式）
  # ============================================================
  rerun:
    if: inputs.mode == 'rerun'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TOOLS_DIR: /tmp/tasks/tools
      OPENLIST_DIR: /tmp/tasks/openlist
    steps:
      - name: 验证输入参数
        run: |
          if [[ -z "${{ inputs.batch_id }}" ]]; then
            echo "::error::rerun 模式需要 batch_id 参数"
            exit 1
          fi
          if [[ -z "${{ inputs.run_id }}" ]]; then
            echo "::error::rerun 模式需要 run_id 参数"
            exit 1
          fi
          echo "重跑 Batch ${{ inputs.batch_id }} (来自 run ${{ inputs.run_id }})"

      - name: 检出仓库
        uses: actions/checkout@v4

      # ============================================================
      # 安装 Cloudflare WARP（始终执行，提供 IPv6 连接）
      # ============================================================
      - name: 安装 Cloudflare WARP
        run: |
          set -e

          echo ">>> 安装 WireGuard 依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools resolvconf

          echo ">>> 下载 wgcf..."
          for i in {1..5}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              -o wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64; then
              echo "wgcf 下载成功"
              break
            fi
            echo "wgcf 下载失败，重试 $i/5..."
            sleep $((i * 5))
          done
          if [ ! -f wgcf ]; then
            echo "::error::无法下载 wgcf，已重试 5 次"
            exit 1
          fi
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

          echo ">>> 注册 WARP 账户..."
          REGISTERED=false
          for i in {1..5}; do
            if wgcf register --accept-tos; then
              REGISTERED=true
              break
            fi
            echo "注册失败，重试 $i/5..."
            sleep $((i * 10))
          done

          # 检查注册是否成功
          if [ "$REGISTERED" = false ] || [ ! -f wgcf-account.toml ]; then
            echo "::error::WARP 注册失败，已重试 5 次"
            exit 1
          fi
          echo ">>> 注册成功"

          echo ">>> 生成 WireGuard 配置..."
          wgcf generate

          echo ">>> 手动拉起 WARP 接口..."
          PRIVATE_KEY=$(grep 'PrivateKey' wgcf-profile.conf | awk '{print $NF}')
          ADDRESSES=$(grep 'Address' wgcf-profile.conf | awk -F'= ' '{print $2}')
          ADDR_V4=$(echo "$ADDRESSES" | awk -F', ' '{print $1}' | sed 's/,$//')
          ADDR_V6=$(echo "$ADDRESSES" | awk -F', ' '{print $2}')
          PEER_KEY=$(grep  'PublicKey' wgcf-profile.conf | awk '{print $NF}')
          ENDPOINT=$(grep  'Endpoint' wgcf-profile.conf  | awk '{print $NF}')

          INTERFACE=wgcf
          sudo ip link add $INTERFACE type wireguard
          echo "$PRIVATE_KEY" | sudo wg set $INTERFACE private-key /dev/stdin
          sudo wg set $INTERFACE peer "$PEER_KEY" endpoint "$ENDPOINT" allowed-ips "::/0"

          # 先启用接口，再添加地址
          sudo ip link set mtu 1280 up dev $INTERFACE
          sudo ip addr add "$ADDR_V4" dev $INTERFACE

          # IPv6 地址非空时才添加
          if [ -n "$ADDR_V6" ]; then
            sudo ip addr add "$ADDR_V6" dev $INTERFACE
            sudo ip -6 route replace ::/0 dev $INTERFACE
          else
            echo "::warning::WARP 未分配 IPv6 地址，跳过 IPv6 配置"
          fi

          echo ">>> 验证 IPv6..."
          curl -6 -sS --max-time 10 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "::warning::IPv6 不通"

          echo ">>> WARP 状态:"
          curl -sS --max-time 5 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E 'warp|ip|colo' || true

      # ============================================================
      # 配置 IP 版本优先级（gai.conf）
      # ============================================================
      - name: 配置 IP 版本优先级
        env:
          PREFER_IPV6: ${{ inputs.prefer_ipv6 }}
        run: |
          echo ">>> 配置 IP 版本优先级 (prefer_ipv6=$PREFER_IPV6)..."

          # 清理旧的 precedence 规则
          sudo sed -i '/^precedence/d' /etc/gai.conf 2>/dev/null || true

          if [ "$PREFER_IPV6" = "true" ]; then
            echo "precedence ::/0  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv6 优先"
          else
            echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf > /dev/null
            echo ">>> 已设置 IPv4 优先"

            # 提高 IPv6 路由 metric（内核层路由控制）
            sudo ip -6 route replace ::/0 dev wgcf metric 1000 2>/dev/null || {
              echo "::warning::WARP IPv6 路由不存在，跳过路由调整"
            }
          fi

          echo ">>> gai.conf 配置:"
          cat /etc/gai.conf

          echo ">>> 验证路由:"
          ip route show | head -5
          echo "---"
          ip -6 route show | head -5

          echo ">>> 测试连通性:"
          curl -4 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv4 OK" || echo "IPv4 失败"
          curl -6 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "IPv6 失败"
          echo ">>> 当前优先使用的出口 IP:"
          curl -sS --max-time 5 https://v.itdog.cn 2>/dev/null || echo "获取失败"

      # ============================================================
      # 网络信息检查
      # ============================================================
      - name: 网络信息检查
        run: |
          echo "=== 网络信息 ==="

          # Azure IMDS 获取区域
          METADATA=$(curl -sS -H "Metadata:true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            --max-time 2 2>/dev/null) || true
          if [ -n "$METADATA" ]; then
            AZURE_LOCATION=$(echo "$METADATA" | jq -r '.compute.location // "未知"')
            VM_SIZE=$(echo "$METADATA" | jq -r '.compute.vmSize // "未知"')
            echo "Azure 区域: $AZURE_LOCATION"
            echo "VM 大小: $VM_SIZE"
          else
            echo "Azure 区域: 不可用"
          fi

          # 获取 IPv4
          IPV4=$(curl -sS "https://4.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv4: ${IPV4:-获取失败}"

          # 获取 IPv6
          IPV6=$(curl -sS "https://6.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv6: ${IPV6:-获取失败或不支持}"

          # 获取 IP 归属地
          GEO=$(curl -sS "https://myip.ipip.net/json" --max-time 5 2>/dev/null) || true
          if [ -n "$GEO" ]; then
            RET=$(echo "$GEO" | jq -r '.ret // "fail"')
            if [ "$RET" = "ok" ]; then
              LOCATION=$(echo "$GEO" | jq -r '.data.location // [] | join(" ")')
              echo "归属地: $LOCATION"
            else
              echo "归属地: 获取失败"
            fi
          else
            echo "归属地: 获取失败"
          fi

      # ============================================================
      # 部署 OpenList（rclone list: remote 依赖本地 OpenList）
      # ============================================================
      - name: 部署 OpenList
        run: |
          set -e
          mkdir -p "${{ env.OPENLIST_DIR }}"
          mkdir -p "${{ env.TOOLS_DIR }}"

          # 下载 OpenList 二进制
          OPENLIST_URL='https://github.com/OpenListTeam/OpenList/releases/latest/download/openlist-linux-amd64.tar.gz'
          echo ">>> 下载 OpenList: $OPENLIST_URL"
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 5 \
              "$OPENLIST_URL" -o "${{ env.TOOLS_DIR }}/openlist.tar.gz"; then
              echo "OpenList 下载成功"
              break
            fi
            echo "OpenList 下载失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if [ ! -f "${{ env.TOOLS_DIR }}/openlist.tar.gz" ]; then
            echo "::error::无法下载 OpenList"
            exit 1
          fi

          echo ">>> 解压 OpenList..."
          tar -xzf "${{ env.TOOLS_DIR }}/openlist.tar.gz" -C "${{ env.OPENLIST_DIR }}"
          chmod +x "${{ env.OPENLIST_DIR }}/openlist"

          # 部署 data.db
          mkdir -p "${{ env.OPENLIST_DIR }}/data"
          if [ -f "$GITHUB_WORKSPACE/openlist/data/data.db" ]; then
            cp -f "$GITHUB_WORKSPACE/openlist/data/data.db" "${{ env.OPENLIST_DIR }}/data/data.db"
            echo "data.db 已从本仓库部署"
          else
            echo ">>> 本仓库无 data.db，尝试从 rclone-action 获取..."
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "Authorization: token ${{ secrets.RCLONE_PAT }}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ github.repository_owner }}/rclone-action/contents/openlist/data/data.db" \
              -o "${{ env.OPENLIST_DIR }}/data/data.db" || {
              echo "::error::无法获取 data.db"
              exit 1
            }
            echo "data.db 已从 rclone-action 仓库部署"
          fi

      - name: 启动 OpenList
        run: |
          set -e

          OPENLIST_BIN="${{ env.OPENLIST_DIR }}/openlist"
          OPENLIST_DATA="${{ env.OPENLIST_DIR }}/data"
          OPENLIST_LOG="/tmp/tasks/openlist.log"

          echo ">>> 启动 OpenList..."
          nohup "$OPENLIST_BIN" server --data "$OPENLIST_DATA" > "$OPENLIST_LOG" 2>&1 &
          OPENLIST_PID=$!
          echo "OpenList PID: $OPENLIST_PID"
          echo "$OPENLIST_PID" > /tmp/tasks/openlist.pid

          echo ">>> 等待 OpenList 就绪..."
          READY=false
          for i in {1..15}; do
            if curl -sS --max-time 3 http://127.0.0.1:5244/api/public/settings > /dev/null 2>&1; then
              READY=true
              echo "OpenList 已就绪 (等待了 $((i * 2)) 秒)"
              break
            fi
            sleep 2
          done

          if [ "$READY" != "true" ]; then
            echo "::warning::OpenList 30 秒内未就绪，查看日志:"
            tail -30 "$OPENLIST_LOG" || true
            echo "::error::OpenList 启动失败"
            exit 1
          fi

      - name: 安装 rclone
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 120 --retry 3 --retry-delay 10 \
              https://rclone.org/install.sh -o /tmp/install_rclone.sh; then
              sudo bash /tmp/install_rclone.sh && break
            fi
            echo "rclone 安装失败，重试 $i/3..."
            sleep $((i * 10))
          done
          if ! command -v rclone &>/dev/null; then
            echo "::error::rclone 安装失败"
            exit 1
          fi
          rclone version

      - name: 获取 rclone.conf
        env:
          RCLONE_PAT: ${{ secrets.RCLONE_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 15 --max-time 30 --retry 2 --retry-delay 5 \
              -H "Authorization: token $RCLONE_PAT" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$REPO_OWNER/rclone-action/contents/rclone.conf" \
              -o "$GITHUB_WORKSPACE/rclone.conf"; then
              echo "rclone.conf 获取成功"
              break
            fi
            echo "获取失败，重试 $i/3..."
            sleep $((i * 5))
          done
          if [ ! -f "$GITHUB_WORKSPACE/rclone.conf" ]; then
            echo "::error::无法获取 rclone.conf"
            exit 1
          fi

      - name: 下载 batch artifact
        uses: actions/download-artifact@v4
        with:
          name: rclone-batches
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 同步 batch ${{ inputs.batch_id }}
        env:
          RCLONE_SRC: ${{ inputs.rclone_src }}
          RCLONE_DST: ${{ inputs.rclone_dst }}
        run: |
          set -eo pipefail

          echo "=== 重跑 Batch ${{ inputs.batch_id }} ==="

          # 检查 batch 文件是否存在
          BATCH_FILE="batch_${{ inputs.batch_id }}.txt"
          if [[ ! -f "$BATCH_FILE" ]]; then
            echo "::error::Batch 文件 $BATCH_FILE 不存在"
            exit 1
          fi

          echo "文件数: $(wc -l < "$BATCH_FILE")"
          echo ""

          DIFFER_FILE="/tmp/differ_${{ inputs.batch_id }}.txt"

          # 检查需要更新的文件（增强鲁棒性）
          echo ">>> 检查需要更新的文件..."
          rclone check \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --one-way \
            --size-only \
            --differ "$DIFFER_FILE" \
            --files-from-raw "$BATCH_FILE" \
            "$RCLONE_SRC" "$RCLONE_DST" || true

          # 删除需要更新的文件（避免 WebDAV PUT 405 错误）
          if [[ -s "$DIFFER_FILE" ]]; then
            echo ">>> 删除 $(wc -l < "$DIFFER_FILE") 个需要更新的文件..."
            while IFS= read -r file; do
              rclone deletefile \
                --config "$GITHUB_WORKSPACE/rclone.conf" \
                "$RCLONE_DST/$file" 2>/dev/null || true
            done < "$DIFFER_FILE"
            echo "删除完成"
          else
            echo ">>> 无需删除，所有文件已是最新"
          fi

          echo ">>> 开始同步..."
          rclone copy \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --files-from-raw "$BATCH_FILE" \
            --transfers "$RCLONE_TRANSFERS" \
            --checkers "$RCLONE_CHECKERS" \
            --tpslimit "$RCLONE_TPSLIMIT" \
            --stats "$RCLONE_STATS_INTERVAL" \
            --stats-one-line \
            --progress \
            --low-level-retries=10 \
            --retries=10 \
            --retries-sleep=30s \
            --max-duration 120m \
            --cutoff-mode soft \
            --timeout=5m \
            "$RCLONE_SRC" "$RCLONE_DST"
          echo ">>> 同步结束"

          # 解析 rclone 输出并生成汇总
          TRANSFERRED=$(grep -oP 'Transferred:\s+\K[^,]+' /tmp/rclone_output.log | tail -1)
          ERRORS=$(grep -oP 'Errors:\s+\K[0-9]+' /tmp/rclone_output.log | tail -1)
          CHECKS=$(grep -oP 'Checks:\s+\K[^,]+' /tmp/rclone_output.log | tail -1)
          ELAPSED=$(grep -oP 'Elapsed time:\s+\K[^[:space:]]+' /tmp/rclone_output.log | tail -1)
          
          echo ""
          echo "=========================================="
          echo "  Batch ${{ inputs.batch_id }} 重跑结果汇总"
          echo "=========================================="
          echo "  文件数: $(wc -l < "$BATCH_FILE")"
          echo "  传输: ${TRANSFERRED:-未知}"
          echo "  检查: ${CHECKS:-未知}"
          echo "  错误: ${ERRORS:-0}"
          echo "  耗时: ${ELAPSED:-未知}"
          echo "=========================================="

      # ============================================================
      # 清理（停止 OpenList 进程）
      # ============================================================
      - name: 停止 OpenList
        if: always()
        run: |
          if [ -f /tmp/tasks/openlist.pid ]; then
            PID=$(cat /tmp/tasks/openlist.pid)
            echo ">>> 停止 OpenList (PID: $PID)..."
            kill "$PID" 2>/dev/null || true
            sleep 3
            kill -9 "$PID" 2>/dev/null || true
            echo "OpenList 已停止"
          fi
