name: URL 直接下载并上传

on:
  workflow_dispatch:
    inputs:
      json_url:
        description: 'JSON 文件链接（包含 URL、文件名等信息）'
        required: true
      enable_ipv6:
        description: '是否启用 IPv6（安装 WARP）'
        required: true
        type: choice
        options:
          - 'yes'
          - 'no'
        default: 'yes'
      rclone_path:
        description: 'rclone 上传目标目录（如 mupan:/Origin_System）'
        required: true
        default: 'mupan:/Origin_System'

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 1: 下载 JSON 并构建矩阵
  # ============================================================
  list-files:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      file-count: ${{ steps.build-matrix.outputs.file-count }}
    steps:
      - name: 下载 JSON 文件
        env:
          JSON_URL: ${{ github.event.inputs.json_url }}
        run: |
          echo ">>> 下载 JSON 文件..."
          for i in {1..3}; do
            if curl -fsSL --connect-timeout 30 --max-time 60 --retry 3 --retry-delay 10 "$JSON_URL" -o files.json; then
              echo "下载成功"
              break
            fi
            echo "下载失败，重试 $i/3..."
            sleep $((i * 5))
          done

          if [ ! -f files.json ]; then
            echo "::error::无法下载 JSON 文件，已重试 3 次"
            exit 1
          fi

          echo "JSON 文件内容:"
          cat files.json

      - name: 构建下载矩阵
        id: build-matrix
        run: |
          # 验证 JSON 格式
          if ! jq empty files.json 2>/dev/null; then
            echo "::error::JSON 格式无效"
            exit 1
          fi

          # 检查所有元素的必填字段
          MISSING_FIELDS=$(jq '[.[] | select(.url == null or .filename == null)] | length' files.json)
          if [ "$MISSING_FIELDS" -gt 0 ]; then
            echo "::error::有 $MISSING_FIELDS 个元素缺少 url 或 filename 字段"
            exit 1
          fi

          # 检查文件名是否包含路径分隔符或遍历字符
          BAD_NAMES=$(jq '[.[] | select(.filename | test("[/\\\\]|\\.\\."))] | length' files.json)
          if [ "$BAD_NAMES" -gt 0 ]; then
            echo "::error::有 $BAD_NAMES 个文件名包含路径分隔符或遍历字符（禁止 / \\ ..）"
            exit 1
          fi

          # 获取文件数量
          FILE_COUNT=$(jq length files.json)
          echo "共找到 $FILE_COUNT 个文件"

          # 检查矩阵数量限制
          if [ "$FILE_COUNT" -gt 256 ]; then
            echo "::error::文件数量($FILE_COUNT)超过 GitHub Actions 矩阵上限 256"
            exit 1
          fi

          # 构建 matrix JSON（保留所有字段）
          MATRIX=$(jq -c '.' files.json)

          # 使用唯一 delimiter 避免内容截断
          DELIMITER="MATRIX_$(date +%s)_$RANDOM"
          echo "matrix<<$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "$MATRIX" >> "$GITHUB_OUTPUT"
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"
          echo "file-count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

          echo "Matrix 输出:"
          echo "$MATRIX" | jq '.'

  # ============================================================
  # Job 2: 矩阵并行下载并上传
  # ============================================================
  download-upload:
    needs: list-files
    if: ${{ needs.list-files.outputs.file-count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.list-files.outputs.matrix) }}
    steps:
      # ============================================================
      # Step 1: 条件安装 WARP（IPv6）
      # ============================================================
      - name: 安装 Cloudflare WARP (如果启用 IPv6)
        if: ${{ github.event.inputs.enable_ipv6 == 'yes' }}
        run: |
          set -e

          echo ">>> 安装 WireGuard 依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard-tools resolvconf

          echo ">>> 下载 wgcf..."
          curl -fsSL -o wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/wgcf

          echo ">>> 注册 WARP 账户..."
          REGISTERED=false
          for i in {1..5}; do
            if wgcf register --accept-tos; then
              REGISTERED=true
              break
            fi
            echo "注册失败，重试 $i/5..."
            sleep $((i * 10))
          done

          # 检查注册是否成功
          if [ "$REGISTERED" = false ] || [ ! -f wgcf-account.toml ]; then
            echo "::error::WARP 注册失败，已重试 5 次"
            exit 1
          fi
          echo ">>> 注册成功"

          echo ">>> 生成 WireGuard 配置..."
          wgcf generate

          echo ">>> 手动拉起 WARP 接口..."
          PRIVATE_KEY=$(grep 'PrivateKey' wgcf-profile.conf | awk '{print $NF}')
          # 更精确的地址解析：按 = 分割后取第二部分，再按逗号分割
          ADDRESSES=$(grep 'Address' wgcf-profile.conf | awk -F'= ' '{print $2}')
          ADDR_V4=$(echo "$ADDRESSES" | awk -F', ' '{print $1}' | sed 's/,$//')
          ADDR_V6=$(echo "$ADDRESSES" | awk -F', ' '{print $2}')
          PEER_KEY=$(grep  'PublicKey' wgcf-profile.conf | awk '{print $NF}')
          ENDPOINT=$(grep  'Endpoint' wgcf-profile.conf  | awk '{print $NF}')

          INTERFACE=wgcf
          sudo ip link add $INTERFACE type wireguard
          echo "$PRIVATE_KEY" | sudo wg set $INTERFACE private-key /dev/stdin
          sudo wg set $INTERFACE peer "$PEER_KEY" endpoint "$ENDPOINT" allowed-ips "::/0"

          # 先启用接口，再添加地址
          sudo ip link set mtu 1280 up dev $INTERFACE
          sudo ip addr add "$ADDR_V4" dev $INTERFACE

          # IPv6 地址非空时才添加
          if [ -n "$ADDR_V6" ]; then
            sudo ip addr add "$ADDR_V6" dev $INTERFACE
            sudo ip -6 route replace ::/0 dev $INTERFACE
          else
            echo "::warning::WARP 未分配 IPv6 地址，跳过 IPv6 配置"
          fi

          echo ">>> 验证 IPv6..."
          curl -6 -sS --max-time 10 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "::warning::IPv6 不通"

          echo ">>> WARP 状态:"
          curl -sS --max-time 5 https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -E 'warp|ip|colo' || true

      # ============================================================
      # Step 2: 网络信息检查
      # ============================================================
      - name: 网络信息检查
        run: |
          echo "=== 网络信息 ==="

          # Azure IMDS 获取区域
          METADATA=$(curl -sS -H "Metadata:true" \
            "http://169.254.169.254/metadata/instance?api-version=2021-02-01" \
            --max-time 2 2>/dev/null) || true
          if [ -n "$METADATA" ]; then
            AZURE_LOCATION=$(echo "$METADATA" | jq -r '.compute.location // "未知"')
            VM_SIZE=$(echo "$METADATA" | jq -r '.compute.vmSize // "未知"')
            echo "Azure 区域: $AZURE_LOCATION"
            echo "VM 大小: $VM_SIZE"
          else
            echo "Azure 区域: 不可用"
          fi

          # 获取 IPv4
          IPV4=$(curl -sS "https://4.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv4: ${IPV4:-获取失败}"

          # 获取 IPv6
          IPV6=$(curl -sS "https://6.itdog.cn" --max-time 5 2>/dev/null) || true
          echo "IPv6: ${IPV6:-获取失败或不支持}"

          # 获取 IP 归属地
          GEO=$(curl -sS "https://myip.ipip.net/json" --max-time 5 2>/dev/null) || true
          if [ -n "$GEO" ]; then
            RET=$(echo "$GEO" | jq -r '.ret // "fail"')
            if [ "$RET" = "ok" ]; then
              LOCATION=$(echo "$GEO" | jq -r '.data.location // [] | join(" ")')
              echo "归属地: $LOCATION"
            else
              echo "归属地: 获取失败"
            fi
          else
            echo "归属地: 获取失败"
          fi

      # ============================================================
      # Step 3: 安装工具（aria2c + rclone）
      # ============================================================
      - name: 安装工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2
          curl https://rclone.org/install.sh | sudo bash
          rclone version

      # ============================================================
      # Step 4: 获取 rclone.conf
      # ============================================================
      - name: 获取 rclone.conf
        env:
          RCLONE_PAT: ${{ secrets.RCLONE_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          curl -fsSL \
            -H "Authorization: token $RCLONE_PAT" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$REPO_OWNER/rclone-action/contents/rclone.conf" \
            -o "$GITHUB_WORKSPACE/rclone.conf" || {
            echo "::error::无法获取 rclone.conf，请检查 RCLONE_PAT 权限或 rclone-action 仓库是否存在"
            exit 1
          }
          echo "rclone.conf 获取成功"

      # ============================================================
      # Step 5: 下载文件
      # ============================================================
      - name: 下载文件
        env:
          URL: ${{ matrix.file.url }}
          FILENAME: ${{ matrix.file.filename }}
        run: |
          set -e

          DL_DIR="/tmp/download"
          mkdir -p "$DL_DIR"

          echo ">>> 下载文件: $FILENAME"
          echo ">>> URL: $URL"

          aria2c \
            --dir="$DL_DIR" \
            --out="$FILENAME" \
            --max-connection-per-server=24 \
            --split=24 \
            --min-split-size=5M \
            --continue=true \
            --auto-file-renaming=false \
            --allow-overwrite=true \
            --connect-timeout=30 \
            --timeout=600 \
            --max-tries=3 \
            --retry-wait=10 \
            --console-log-level=notice \
            --summary-interval=10 \
            "$URL"

          echo ">>> 下载完成: $DL_DIR/$FILENAME"
          ls -lh "$DL_DIR/$FILENAME"

      # ============================================================
      # Step 6: 校验文件（如果提供了 md5 或 sha256）
      # ============================================================
      - name: 校验文件
        id: verify
        env:
          FILENAME: ${{ matrix.file.filename }}
          # md5 和 sha256 为可选字段
          # JSON null、缺失、字符串 "null" 均会被跳过
          MD5_HASH: ${{ matrix.file.md5 }}
          SHA256_HASH: ${{ matrix.file.sha256 }}
        run: |
          set -e

          DL_DIR="/tmp/download"
          FILE_PATH="$DL_DIR/$FILENAME"
          HAS_ERROR=false

          # 校验 MD5（忽略大小写）
          if [ -n "$MD5_HASH" ] && [ "$MD5_HASH" != "null" ]; then
            echo ">>> 校验 MD5: $MD5_HASH"
            ACTUAL_MD5=$(md5sum "$FILE_PATH" | awk '{print $1}') || {
              echo "::error::md5sum 执行失败"
              HAS_ERROR=true
            }
            if [ "$HAS_ERROR" = false ]; then
              echo ">>> 实际 MD5: $ACTUAL_MD5"
              if [ "${ACTUAL_MD5,,}" != "${MD5_HASH,,}" ]; then
                echo "::error::MD5 校验失败"
                echo "  期望: $MD5_HASH"
                echo "  实际: $ACTUAL_MD5"
                HAS_ERROR=true
              else
                echo ">>> MD5 校验通过"
              fi
            fi
          fi

          # 校验 SHA256（独立执行，不受 MD5 结果影响）
          if [ -n "$SHA256_HASH" ] && [ "$SHA256_HASH" != "null" ]; then
            echo ">>> 校验 SHA256: $SHA256_HASH"
            ACTUAL_SHA256=$(sha256sum "$FILE_PATH" | awk '{print $1}') || {
              echo "::error::sha256sum 执行失败"
              HAS_ERROR=true
            }
            if [ -n "$ACTUAL_SHA256" ]; then
              echo ">>> 实际 SHA256: $ACTUAL_SHA256"
              if [ "${ACTUAL_SHA256,,}" != "${SHA256_HASH,,}" ]; then
                echo "::error::SHA256 校验失败"
                echo "  期望: $SHA256_HASH"
                echo "  实际: $ACTUAL_SHA256"
                HAS_ERROR=true
              else
                echo ">>> SHA256 校验通过"
              fi
            fi
          fi

          # 统一判断
          if [ "$HAS_ERROR" = true ]; then
            echo "::error::文件校验失败，跳过上传"
            exit 1
          fi

      # ============================================================
      # Step 7: 生成 .md5 文件
      # ============================================================
      - name: 生成 MD5 文件
        if: steps.verify.outcome == 'success'
        env:
          FILENAME: ${{ matrix.file.filename }}
        run: |
          set -e

          DL_DIR="/tmp/download"
          FILE_PATH="$DL_DIR/$FILENAME"
          MD5_FILE="$DL_DIR/$FILENAME.md5"

          echo ">>> 生成 MD5 文件: $FILENAME.md5"
          md5sum "$FILE_PATH" | awk '{print $1}' > "$MD5_FILE"

          echo ">>> MD5 文件内容:"
          cat "$MD5_FILE"

      # ============================================================
      # Step 8: 切换到 IPv4 优先（如果已启用 WARP）
      # 设计意图：下载阶段走 IPv6（WARP），上传阶段走 IPv4（提高上传稳定性）
      # 使用 gai.conf 控制应用层地址选择优先级
      # ============================================================
      - name: 切换到 IPv4 优先
        if: ${{ github.event.inputs.enable_ipv6 == 'yes' }}
        run: |
          echo ">>> 切换到 IPv4 优先..."

          # 方法1: 修改 gai.conf（应用层优先级控制）
          # 清除旧规则，添加 IPv4 高优先级
          sudo sed -i '/^precedence \:\:ffff\:0\:0/d' /etc/gai.conf 2>/dev/null || true
          echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf > /dev/null
          echo ">>> gai.conf 配置:"
          cat /etc/gai.conf

          # 方法2: 提高 IPv6 路由 metric（内核层路由控制）
          sudo ip -6 route replace ::/0 dev wgcf metric 1000 2>/dev/null || {
            echo "::warning::WARP IPv6 路由不存在，跳过路由切换"
          }

          echo ">>> 验证路由:"
          ip route show | head -5
          echo "---"
          ip -6 route show | head -5

          echo ">>> 测试连通性:"
          curl -4 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv4 OK" || echo "IPv4 失败"
          curl -6 -sS --max-time 5 https://ip.sb 2>/dev/null && echo "IPv6 OK" || echo "IPv6 失败"
          echo ">>> 当前优先使用的出口 IP:"
          curl -sS --max-time 5 https://v.itdog.cn 2>/dev/null || echo "获取失败"

      # ============================================================
      # Step 9: 上传文件到 rclone
      # ============================================================
      - name: 上传文件到 rclone
        if: steps.verify.outcome == 'success'
        env:
          FILENAME: ${{ matrix.file.filename }}
          RCLONE_PATH: ${{ github.event.inputs.rclone_path }}
        run: |
          set -e

          DL_DIR="/tmp/download"
          RCLONE_TARGET="$RCLONE_PATH"

          # 校验路径安全性
          if [[ "$RCLONE_TARGET" =~ [$'\n'\;\$\(\)\`] ]]; then
            echo "::error::rclone_path 包含非法字符"
            exit 1
          fi

          # 标准化路径：反斜杠转正斜杠
          RCLONE_TARGET="${RCLONE_TARGET//\\//}"

          # 确保目标路径以 / 结尾
          if [[ ! "$RCLONE_TARGET" =~ [:/]$ ]]; then
            RCLONE_TARGET="$RCLONE_TARGET/"
          fi

          # 上传主文件
          echo ">>> 上传 $FILENAME -> ${RCLONE_TARGET}${FILENAME}"
          rclone copyto "$DL_DIR/$FILENAME" "${RCLONE_TARGET}${FILENAME}" \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --progress \
            --onedrive-chunk-size 250M \
            --low-level-retries=3 \
            --retries=3

          # 上传 MD5 文件
          echo ">>> 上传 $FILENAME.md5 -> ${RCLONE_TARGET}${FILENAME}.md5"
          rclone copyto "$DL_DIR/$FILENAME.md5" "${RCLONE_TARGET}${FILENAME}.md5" \
            --config "$GITHUB_WORKSPACE/rclone.conf" \
            --progress \
            --onedrive-chunk-size 250M \
            --low-level-retries=3 \
            --retries=3

          echo ">>> 上传完成"
